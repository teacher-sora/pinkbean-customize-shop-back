app = 'pinkbean-customize-shop-back'
primary_region = 'nrt'  # 도쿄(한국 최근접) → 지연 최소

[build]

[env]
  WEB_CONCURRENCY = '4'   # 단일 머신의 uvicorn 워커 수(요청 병렬). 필요 시 늘림.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1   # 항상 1대 예열 → 콜드스타트 제거(속도 우선).
  processes = ['app']

# 단일 머신에 리소스 집중 + 워커 다중화(2머신 HA 아님 — `fly scale count 1`).
[[vm]]
  memory_mb = 1024
  cpu_kind = 'shared'
  cpus = 2
